<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Legion3K 獨立縮放校準工具</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
  body { background: #0d0d12; color: #c8c0a8; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  
  #toolbar { background: #16161e; padding: 8px; display: flex; flex-wrap: wrap; gap: 6px; border-bottom: 1px solid #2a2a3a; z-index: 10; }
  .ctrl-group { display: flex; align-items: center; gap: 4px; background: #1e1e2e; padding: 4px 6px; border-radius: 4px; }
  label { font-size: 10px; color: #7a7a9a; }
  input[type=number] { width: 50px; background: #000; border: 1px solid #3a3a5a; color: #c8a050; font-size: 11px; }

  #main { flex: 1; position: relative; background: #000; overflow: hidden; }
  canvas { display: block; image-rendering: pixelated; }

  /* 虛擬搖桿與縮放控制 */
  #mobile-controls {
    position: absolute; bottom: 20px; left: 15px; display: flex; flex-direction: column; gap: 10px;
  }
  .dpad { display: grid; grid-template-columns: repeat(3, 45px); grid-template-rows: repeat(3, 45px); gap: 5px; }
  .joy-btn {
    background: rgba(42, 42, 58, 0.9); border: 1px solid #c8a050; border-radius: 8px;
    color: #c8a050; display: flex; align-items: center; justify-content: center; font-size: 18px;
  }
  .joy-btn:active { background: #c8a050; color: #000; }

  /* 獨立縮放按鈕區 */
  #scale-controls {
    position: absolute; bottom: 20px; right: 15px; display: flex; flex-direction: column; gap: 8px;
  }
  .scale-group { display: flex; gap: 5px; align-items: center; background: rgba(30, 30, 46, 0.7); padding: 5px; border-radius: 8px; }
  .scale-btn { width: 40px; height: 40px; border-radius: 6px; background: #1e1e2e; color: #fff; border: 1px solid #3a3a5a; font-size: 14px; }
  .btn-active { background: #c8a050 !important; color: #000 !important; }

  #side-panel {
    position: absolute; right: 15px; top: 15px; width: 120px;
    background: rgba(16, 16, 26, 0.85); padding: 8px; border-radius: 4px; pointer-events: none;
  }
  #param-box { font-size: 9px; color: #7ab870; white-space: pre-wrap; word-break: break-all; pointer-events: auto; }
</style>
</head>
<body>

<div id="toolbar">
  <div class="ctrl-group">
    <label>X</label><input type="number" id="offX" value="0" step="0.5">
    <label>Y</label><input type="number" id="offY" value="0" step="0.5">
  </div>
  <div class="ctrl-group">
    <label>SX</label><input type="number" id="scaleX" value="1.000" step="0.001">
    <label>SY</label><input type="number" id="scaleY" value="1.000" step="0.001">
  </div>
  <button id="btnLock" onclick="toggleLock()" class="btn-active" style="padding:4px 8px; font-size:11px; border-radius:4px; border:none;">🔗 鎖定比例</button>
  <button onclick="copyParams()" style="background:#7ab870; color:#000; border:none; padding:4px 8px; border-radius:4px; font-weight:bold; font-size:11px;">複製</button>
</div>

<div id="main">
  <canvas id="cv"></canvas>
  
  <div id="mobile-controls">
    <div class="dpad">
      <div></div><div class="joy-btn" id="up">↑</div><div></div>
      <div class="joy-btn" id="left">←</div><div class="joy-btn" onclick="resetAll()">R</div><div class="joy-btn" id="right">→</div>
      <div></div><div class="joy-btn" id="down">↓</div><div></div>
    </div>
  </div>

  <div id="scale-controls">
    <div class="scale-group">
      <span style="font-size:10px; width:20px;">寬</span>
      <button class="scale-btn" id="sx_in">+</button>
      <button class="scale-btn" id="sx_out">-</button>
    </div>
    <div class="scale-group">
      <span style="font-size:10px; width:20px;">高</span>
      <button class="scale-btn" id="sy_in">+</button>
      <button class="scale-btn" id="sy_out">-</button>
    </div>
  </div>

  <div id="side-panel">
    <div id="param-box"></div>
  </div>
</div>

<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
let params = { offX: 0, offY: 0, scaleX: 1.0, scaleY: 1.0 };
let viewZoom = 1.0, isLocked = true;
const W = 720, H = 405;

const baseImg = new Image();
const overlayImg = new Image();
baseImg.src = 'base_map.png'; 
overlayImg.src = 'mongolia_overlay.png';

[baseImg, overlayImg].forEach(img => img.onload = render);

function render() {
  cv.width = window.innerWidth;
  cv.height = window.innerHeight - 100;
  ctx.clearRect(0, 0, cv.width, cv.height);
  ctx.imageSmoothingEnabled = false;

  const displayW = W * viewZoom, displayH = H * viewZoom;
  const baseX = (cv.width - displayW) / 2, baseY = (cv.height - displayH) / 2;

  ctx.globalAlpha = 0.5;
  ctx.drawImage(baseImg, baseX, baseY, displayW, displayH);

  ctx.globalAlpha = 0.8;
  ctx.save();
  ctx.translate(baseX + params.offX * viewZoom, baseY + params.offY * viewZoom);
  ctx.scale(params.scaleX, params.scaleY);
  ctx.drawImage(overlayImg, 0, 0, displayW, displayH);
  ctx.restore();

  updateUI();
}

function updateUI() {
  document.getElementById('offX').value = params.offX;
  document.getElementById('offY').value = params.offY;
  document.getElementById('scaleX').value = params.scaleX.toFixed(4);
  document.getElementById('scaleY').value = params.scaleY.toFixed(4);
  
  const json = {
    offset_px: { x: params.offX, y: params.offY },
    scale: { x: params.scaleX, y: params.scaleY }
  };
  document.getElementById('param-box').textContent = JSON.stringify(json, null, 1);
}

function toggleLock() {
  isLocked = !isLocked;
  const btn = document.getElementById('btnLock');
  btn.classList.toggle('btn-active', isLocked);
  btn.innerText = isLocked ? "🔗 鎖定比例" : "🔓 自由縮放";
}

// 觸控移動
let isDragging = false, lastX, lastY;
cv.addEventListener('touchstart', e => {
  if(e.touches.length === 1) {
    isDragging = true;
    lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
  }
});
cv.addEventListener('touchmove', e => {
  if (!isDragging) return;
  params.offX += (e.touches[0].clientX - lastX) / viewZoom;
  params.offY += (e.touches[0].clientY - lastY) / viewZoom;
  lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
  render();
});
cv.addEventListener('touchend', () => isDragging = false);

// 按鈕連續動作
function setupBtn(id, action) {
  const btn = document.getElementById(id);
  let timer;
  const run = () => { action(); render(); timer = setTimeout(run, 60); };
  btn.addEventListener('touchstart', e => { e.preventDefault(); run(); });
  btn.addEventListener('touchend', () => clearTimeout(timer));
}

setupBtn('up', () => params.offY -= 0.5);
setupBtn('down', () => params.offY += 0.5);
setupBtn('left', () => params.offX -= 0.5);
setupBtn('right', () => params.offX += 0.5);

setupBtn('sx_in', () => { 
    params.scaleX += 0.001; 
    if(isLocked) params.scaleY = params.scaleX;
});
setupBtn('sx_out', () => { 
    params.scaleX -= 0.001; 
    if(isLocked) params.scaleY = params.scaleX;
});
setupBtn('sy_in', () => { 
    params.scaleY += 0.001; 
    if(isLocked) params.scaleX = params.scaleY;
});
setupBtn('sy_out', () => { 
    params.scaleY -= 0.001; 
    if(isLocked) params.scaleX = params.scaleY;
});

function resetAll() { params = { offX: 0, offY: 0, scaleX: 1.0, scaleY: 1.0 }; render(); }
function copyParams() {
  navigator.clipboard.writeText(document.getElementById('param-box').textContent).then(() => alert("參數已複製"));
}

window.addEventListener('resize', render);
render();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>軍團三國 · Legion3K</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#0a0a0f;color:#e8dcc8;font-family:"Noto Serif TC","STSong",serif;overflow:hidden;width:100vw;height:100vh;user-select:none}
#app{position:relative;width:100vw;height:100vh;overflow:hidden}
#mc{position:absolute;top:0;left:0;width:100%;height:100%;touch-action:none;cursor:grab}
#mc:active{cursor:grabbing}
canvas{position:absolute;top:0;left:0;image-rendering:pixelated;image-rendering:crisp-edges}
/* UI 樣式省略，保持與 v2 一致 */
#tb{position:fixed;top:0;left:0;right:0;height:44px;background:rgba(10,10,20,.9);border-bottom:1px solid rgba(200,170,100,.2);display:flex;align-items:center;padding:0 16px;z-index:100}
#tb h1{font-size:15px;color:#c8aa64}
#ip{position:fixed;bottom:-100%;left:0;right:0;background:#0f0c19;padding:20px;z-index:200;transition:bottom .3s;border-radius:18px 18px 0 0}
#ip.open{bottom:0}
#ld{position:fixed;inset:0;background:#0a0a0f;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999}
#ld.fade{opacity:0;pointer-events:none;transition:opacity .5s}
</style>
</head>
<body>
<div id="ld"><div style="color:#c8aa64;font-size:24px;margin-bottom:20px">軍團三國</div><div id="lp" style="color:rgba(200,170,100,.5)">載入資源中...</div></div>
<div id="app">
    <div id="tb"><h1>軍團三國 · 全境地圖</h1></div>
    <div id="mc"><canvas id="mc1"></canvas><canvas id="mc2"></canvas></div>
    <div id="ip">
        <div id="pn" style="font-size:20px;font-weight:700;color:#f0d88a"></div>
        <div id="pi" style="font-size:12px;color:#c8aa64"></div>
        <div id="pr" style="color:#e8dcc8;margin-top:8px"></div>
    </div>
</div>

<script>
const W=720, H=490;
let binData, fixedData=[];
let sc=1.0, vx=0, vy=0;
const c1=document.getElementById('mc1'), ctx1=c1.getContext('2d');
const c2=document.getElementById('mc2'), ctx2=c2.getContext('2d');
const off=document.createElement('canvas'); off.width=W; off.height=H;
const octx=off.getContext('2d');

// 載入資料
async function init() {
    try {
        const [resBin, resFix] = await Promise.all([
            fetch('legion3k_v2.bin'),
            fetch('jun_fixed_v2_1_0.json')
        ]);
        const buf = await resBin.arrayBuffer();
        binData = new Uint8Array(buf);
        const json = await resFix.json();
        fixedData = json.juns || [];
        
        document.getElementById('ld').classList.add('fade');
        setupCanvas();
        preRender();
        render();
    } catch(e) {
        document.getElementById('lp').innerText = "載入失敗，請確認檔案路徑";
    }
}

function setupCanvas() {
    c1.width=c2.width=window.innerWidth;
    c1.height=c2.height=window.innerHeight;
    vx=(c1.width-W)/2; vy=(c1.height-H)/2;
}

// 根據 JSON 中的 color_hex 進行渲染
function preRender() {
    octx.clearRect(0,0,W,H);
    const img = octx.createImageData(W,H);
    const data = img.data;
    
    // 建立 ID 轉 顏色的映射表
    const colorMap = {};
    fixedData.forEach(j => {
        colorMap[j.id] = j.color_hex;
    });

    for(let i=0; i<W*H; i++) {
        const id = binData[i];
        if(id > 0 && colorMap[id]) {
            const hex = colorMap[id];
            const r = parseInt(hex.slice(1,3), 16);
            const g = parseInt(hex.slice(3,5), 16);
            const b = parseInt(hex.slice(5,7), 16);
            const idx = i*4;
            data[idx]=r; data[idx+1]=g; data[idx+2]=b; data[idx+3]=255;
        }
    }
    octx.putImageData(img, 0, 0);
}

function render() {
    ctx1.clearRect(0,0,c1.width,c1.height);
    ctx1.save();
    ctx1.translate(vx, vy);
    ctx1.scale(sc, sc);
    ctx1.drawImage(off, 0, 0);
    ctx1.restore();
}

// 點擊互動
c2.addEventListener('click', e => {
    const lx = (e.clientX - vx) / sc;
    const ly = (e.clientY - vy) / sc;
    if(lx>=0 && lx<W && ly>=0 && ly<H) {
        const id = binData[Math.floor(ly)*W + Math.floor(lx)];
        if(id > 0) {
            const info = fixedData.find(j => j.id === id);
            if(info) {
                document.getElementById('pn').innerText = info.name;
                document.getElementById('pi').innerText = `ID: ${info.id}`;
                document.getElementById('pr').innerText = `${info.region} · 起源: ${info.origin_faction_name}`;
                document.getElementById('ip').classList.add('open');
            }
        } else {
            document.getElementById('ip').classList.remove('open');
        }
    }
});

// 縮放與拖曳邏輯 (簡化版)
window.addEventListener('resize', setupCanvas);
init();
</script>
</body>
</html>

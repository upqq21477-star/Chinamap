<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>軍團三國 Legion3K - 2.1.0</title>
<style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{background:#0a0a0f;color:#e8dcc8;font-family:"Noto Serif TC","STSong",serif;overflow:hidden;width:100vw;height:100vh;user-select:none}
    #app{position:relative;width:100vw;height:100vh;overflow:hidden}
    canvas{position:absolute;top:0;left:0;image-rendering:pixelated;image-rendering:crisp-edges}
    
    /* UI 介面 */
    #ip{position:fixed;bottom:-300px;left:0;right:0;background:rgba(20,20,30,0.95);border-top:1px solid #c8aa64;padding:20px;transition:0.3s;z-index:200;backdrop-filter:blur(10px)}
    #ip.open{bottom:0}
    .nt{display:inline-block;padding:4px 12px;background:rgba(200,170,100,0.1);border:1px solid rgba(200,170,100,0.3);margin:4px;font-size:14px;border-radius:2px}
    #ld{position:fixed;top:0;left:0;right:0;bottom:0;background:#0a0a0f;display:flex;justify-content:center;align-items:center;z-index:999;transition:0.5s}
    #ld.fade{opacity:0;pointer-events:none}
</style>
</head>
<body>

<div id="app">
    <canvas id="mc1"></canvas> <canvas id="mc2"></canvas> <div id="ld">載入中...</div>

    <div id="ip">
        <h2 id="pn" style="color:#c8aa64;margin-bottom:8px">郡縣名稱</h2>
        <div style="font-size:14px;opacity:0.8;margin-bottom:12px">
            ID: <span id="pi"></span> | 區域: <span id="pr"></span> | 起源: <span id="pf"></span>
        </div>
        <div id="nel"></div>
        <button onclick="closePanel()" style="margin-top:15px;background:none;border:1px solid #c8aa64;color:#c8aa64;padding:5px 15px;cursor:pointer">關閉</button>
    </div>
</div>

<script>
/**
 * 軍團三國地圖渲染引擎 v2.1.0
 * 數據規範：720x490 Bin, JSON 固定色
 */
const W = 720, H = 490;
const mc1 = document.getElementById('mc1'), ctx1 = mc1.getContext('2d', {alpha: false});
const mc2 = document.getElementById('mc2'), ctx2 = mc2.getContext('2d');

let sc = 1, vx = 0, vy = 0, drag = false, mv = false, dsx, dsy, dvx, dvy;
let pixels = new Uint8Array(W * H);
let junData = {};
let idToColor = {};

// 初始化
async function init() {
    try {
        // 1. 載入 JSON (讀取固定顏色)
        const resJson = await fetch('jun_fixed_v2_1_0.json');
        const fullData = await resJson.json();
        fullData.data.forEach(d => {
            junData[d.id] = d;
            idToColor[d.id] = d.color_hex; // 這裡直接使用 fixed 數據
        });

        // 2. 載入 Bin (720x490)
        const resBin = await fetch('legion3k_v2.bin');
        const buf = await resBin.arrayBuffer();
        pixels = new Uint8Array(buf);

        window.addEventListener('resize', resize);
        resize();
        autoCenter();
        render();
        
        document.getElementById('ld').classList.add('fade');
    } catch (e) {
        console.error("載入失敗:", e);
        document.getElementById('ld').innerText = "檔案載入失敗，請確認檔案路徑";
    }
}

function resize() {
    mc1.width = mc2.width = window.innerWidth;
    mc1.height = mc2.height = window.innerHeight;
    render();
}

function autoCenter() {
    sc = Math.min(window.innerWidth / W, window.innerHeight / H) * 0.9;
    vx = (window.innerWidth - W * sc) / 2;
    vy = (window.innerHeight - H * sc) / 2;
}

// 核心渲染：禁止隨機色，嚴格匹配像素
function render() {
    ctx1.fillStyle = "#0a0a0f";
    ctx1.fillRect(0, 0, mc1.width, mc1.height);

    const imgData = ctx1.createImageData(W, H);
    for (let i = 0; i < pixels.length; i++) {
        const id = pixels[i];
        const idx = i * 4;
        const hex = idToColor[id];

        if (id > 0 && hex) {
            imgData.data[idx] = parseInt(hex.slice(1, 3), 16);
            imgData.data[idx + 1] = parseInt(hex.slice(3, 5), 16);
            imgData.data[idx + 2] = parseInt(hex.slice(5, 7), 16);
            imgData.data[idx + 3] = 255;
        } else {
            imgData.data[idx] = 15;
            imgData.data[idx + 1] = 15;
            imgData.data[idx + 2] = 25;
            imgData.data[idx + 3] = 255;
        }
    }

    const tmp = document.createElement('canvas');
    tmp.width = W; tmp.height = H;
    tmp.getContext('2d').putImageData(imgData, 0, 0);

    ctx1.imageSmoothingEnabled = false;
    ctx1.drawImage(tmp, vx, vy, W * sc, H * sc);
}

// 座標偵測
function pxToJun(x, y) {
    const lx = Math.floor((x - vx) / sc);
    const ly = Math.floor((y - vy) / sc);
    if (lx >= 0 && lx < W && ly >= 0 && ly < H) {
        return pixels[ly * W + lx];
    }
    return 0;
}

// 面板控制
function showPanel(id) {
    const d = junData[id];
    if (!d) return;
    document.getElementById('pn').innerText = d.name;
    document.getElementById('pi').innerText = d.id;
    document.getElementById('pr').innerText = d.region;
    document.getElementById('pf').innerText = d.origin_faction_name;
    
    const nel = document.getElementById('nel');
    nel.innerHTML = '';
    d.neighbors.forEach(nid => {
        const nd = junData[nid];
        if (nd) {
            const span = document.createElement('span');
            span.className = 'nt';
            span.innerText = nd.name;
            nel.appendChild(span);
        }
    });
    document.getElementById('ip').classList.add('open');
}

function closePanel() { document.getElementById('ip').classList.remove('open'); }

// 交互事件
mc2.addEventListener('mousedown', e => {
    drag = true; mv = false;
    dsx = e.clientX; dsy = e.clientY;
    dvx = vx; dvy = vy;
});

window.addEventListener('mousemove', e => {
    if (!drag) return;
    const dx = e.clientX - dsx, dy = e.clientY - dsy;
    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) mv = true;
    vx = dvx + dx; vy = dvy + dy;
    render();
});

window.addEventListener('mouseup', e => {
    if (drag && !mv) {
        const id = pxToJun(e.clientX, e.clientY);
        if (id > 0) showPanel(id); else closePanel();
    }
    drag = false;
});

mc2.addEventListener('wheel', e => {
    e.preventDefault();
    const delta = e.deltaY < 0 ? 1.1 : 0.9;
    const ns = Math.max(0.1, Math.min(20, sc * delta));
    vx = e.clientX - (e.clientX - vx) * (ns / sc);
    vy = e.clientY - (e.clientY - vy) * (ns / sc);
    sc = ns;
    render();
}, {passive: false});

init();
</script>
</body>
</html>

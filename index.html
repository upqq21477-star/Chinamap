<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>軍團三國 Legion3K - v2.1.0</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#0a0a0f;color:#e8dcc8;font-family:"Noto Serif TC","STSong",serif;overflow:hidden;width:100vw;height:100vh;user-select:none}
#app{position:relative;width:100vw;height:100vh;overflow:hidden}
#mc{position:absolute;top:0;left:0;width:100%;height:100%;touch-action:none;cursor:grab}
#mc:active{cursor:grabbing}
canvas{position:absolute;top:0;left:0;image-rendering:pixelated;image-rendering:crisp-edges}
#tb{position:fixed;top:0;left:0;right:0;height:44px;background:linear-gradient(180deg,rgba(10,10,20,.98),rgba(10,10,20,.85));border-bottom:1px solid rgba(200,170,100,.2);display:flex;align-items:center;padding:0 16px;z-index:100;backdrop-filter:blur(8px)}
#tt{font-size:18px;font-weight:600;letter-spacing:1px;color:#c8aa64;text-shadow:0 0 10px rgba(200,170,100,.3)}
#ip{position:fixed;bottom:-340px;left:0;right:0;background:rgba(15,15,25,.96);border-top:1px solid #c8aa64;padding:20px;transition:0.3s cubic-bezier(0.4,0,0.2,1);z-index:200;backdrop-filter:blur(15px);box-shadow:0 -5px 25px rgba(0,0,0,0.5)}
#ip.open{bottom:0}
#pn{font-size:24px;color:#c8aa64;margin-bottom:4px;display:flex;align-items:baseline;gap:8px}
#pi{font-size:14px;opacity:0.5;font-family:monospace}
.row{display:flex;margin:10px 0;gap:15px;font-size:14px;border-bottom:1px solid rgba(200,170,100,0.1);padding-bottom:10px}
.lab{color:#c8aa64;width:60px}
#nel{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.nt{padding:3px 10px;background:rgba(200,170,100,0.1);border:1px solid rgba(200,170,100,0.3);font-size:12px;color:#e8dcc8;border-radius:2px}
#ld{position:fixed;top:0;left:0;right:0;bottom:0;background:#0a0a0f;display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:999;transition:0.6s}
#ld.fade{opacity:0;pointer-events:none}
.ls{width:40px;height:40px;border:3px solid rgba(200,170,100,0.2);border-top-color:#c8aa64;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:15px}
@keyframes spin{to{transform:rotate(360deg)}}
#ctrl{position:fixed;right:16px;bottom:100px;display:flex;flex-direction:column;gap:10px;z-index:150}
.btn{width:44px;height:44px;background:rgba(20,20,35,0.8);border:1px solid #c8aa64;color:#c8aa64;display:flex;justify-content:center;align-items:center;border-radius:4px;font-size:20px;backdrop-filter:blur(5px)}
</style>
</head>
<body>

<div id="app">
  <canvas id="mc1"></canvas>
  <canvas id="mc2"></canvas>
  <div id="mc"></div>

  <div id="tb"><div id="tt">軍團三國 Legion3K</div></div>

  <div id="ctrl">
    <div class="btn" id="zi">+</div>
    <div class="btn" id="zo">−</div>
    <div class="btn" id="rh">⌂</div>
  </div>

  <div id="ip">
    <div id="pn">郡縣名稱 <span id="pi">#000</span></div>
    <div class="row">
      <div><span class="lab">區域</span><span id="pr">---</span></div>
      <div><span class="lab">起源</span><span id="pf">---</span></div>
    </div>
    <div class="row">
      <div><span class="lab">交通</span><span id="pt">0.0</span></div>
      <div><span class="lab">動員</span><span id="pm">0</span></div>
    </div>
    <div style="font-size:13px;color:#c8aa64">接壤郡縣</div>
    <div id="nel"></div>
    <div style="height:20px"></div>
  </div>

  <div id="ld"><div class="ls"></div><div>正在重構地圖數據...</div></div>
</div>

<script>
/**
 * 軍團三國地圖渲染引擎 v2.1.0 (Fixed Edition)
 * 更新點：720x490 解析度、禁用隨機色、直接讀取 JSON 顏色
 */
const W=720, H=490;
const mc1=document.getElementById('mc1'), ctx1=mc1.getContext('2d',{alpha:false});
const mc2=document.getElementById('mc2'), ctx2=mc2.getContext('2d');
let sc=1, vx=0, vy=0, drag=false, mv=false, dsx, dsy, dvx, dvy;
let pixels=new Uint8Array(W*H), junData={}, idToColor={};

async function init() {
  try {
    // 1. 載入固定表獲取顏色與數據
    const resJson = await fetch('jun_fixed_v2_1_0.json');
    const json = await resJson.json();
    json.data.forEach(d => {
      junData[d.id] = d;
      idToColor[d.id] = d.color_hex; // 強制讀取固定顏色
    });

    // 2. 載入 720x490 Bin 資料
    const resBin = await fetch('legion3k_v2.bin');
    const buf = await resBin.arrayBuffer();
    pixels = new Uint8Array(buf);

    window.addEventListener('resize', resize);
    resize();
    resetView();
    document.getElementById('ld').classList.add('fade');
  } catch(e) {
    console.error("載入出錯:", e);
    document.querySelector('#ld div:last-child').innerText = "數據加載失敗，請檢查檔案名稱";
  }
}

function resize() {
  mc1.width=mc2.width=window.innerWidth;
  mc1.height=mc2.height=window.innerHeight;
  render();
}

function resetView() {
  sc = Math.min(window.innerWidth/W, window.innerHeight/H) * 0.9;
  vx = (window.innerWidth - W*sc)/2;
  vy = (window.innerHeight - H*sc)/2;
  render();
}

function clamp() {
  const padW = window.innerWidth * 0.5, padH = window.innerHeight * 0.5;
  vx = Math.min(padW, Math.max(window.innerWidth - W*sc - padW, vx));
  vy = Math.min(padH, Math.max(window.innerHeight - H*sc - padH, vy));
}

// 核心渲染邏輯：嚴格依照 idToColor 進行渲染
function render() {
  ctx1.fillStyle='#05050a';
  ctx1.fillRect(0,0,mc1.width,mc1.height);
  
  const imgData = ctx1.createImageData(W,H);
  for(let i=0; i<pixels.length; i++) {
    const id = pixels[i];
    const idx = i*4;
    const hex = idToColor[id];
    
    if(id > 0 && hex) {
      imgData.data[idx]   = parseInt(hex.slice(1,3), 16);
      imgData.data[idx+1] = parseInt(hex.slice(3,5), 16);
      imgData.data[idx+2] = parseInt(hex.slice(5,7), 16);
      imgData.data[idx+3] = 255;
    } else {
      imgData.data[idx]=15; imgData.data[idx+1]=15; imgData.data[idx+2]=25; imgData.data[idx+3]=255;
    }
  }

  const tmp = document.createElement('canvas');
  tmp.width=W; tmp.height=H;
  tmp.getContext('2d').putImageData(imgData,0,0);
  
  ctx1.imageSmoothingEnabled = false;
  ctx1.drawImage(tmp, vx, vy, W*sc, H*sc);
}

function pxToJun(x,y) {
  const lx=Math.floor((x-vx)/sc), ly=Math.floor((y-vy)/sc);
  if(lx>=0 && lx<W && ly>=0 && ly<H) return pixels[ly*W+lx];
  return 0;
}

function showPanel(id) {
  const d = junData[id];
  if(!d) return;
  document.getElementById('pn').firstChild.textContent = d.name + " ";
  document.getElementById('pi').innerText = "#" + d.id.toString().padStart(3,'0');
  document.getElementById('pr').innerText = d.region;
  document.getElementById('pf').innerText = d.origin_faction_name;
  document.getElementById('pt').innerText = d.traffic.toFixed(1);
  document.getElementById('pm').innerText = d.mobilization + "%";
  
  const nel = document.getElementById('nel');
  nel.innerHTML = '';
  d.neighbors.forEach(nid => {
    const n = junData[nid];
    if(n) {
      const s = document.createElement('div');
      s.className='nt'; s.innerText=n.name;
      nel.appendChild(s);
    }
  });
  document.getElementById('ip').classList.add('open');
}

function closePanel() { document.getElementById('ip').classList.remove('open'); }

// 交互事件邏輯 (保持原始 HTML 操作感)
const mc = document.getElementById('mc');
mc.addEventListener('mousedown',e=>{drag=true;mv=false;dsx=e.clientX;dsy=e.clientY;dvx=vx;dvy=vy;});
window.addEventListener('mousemove',e=>{
  if(!drag)return;
  const dx=e.clientX-dsx,dy=e.clientY-dsy;
  if(Math.abs(dx)>3||Math.abs(dy)>3)mv=true;
  vx=dvx+dx;vy=dvy+dy;clamp();render();
});
window.addEventListener('mouseup',e=>{
  if(drag && !mv){
    const id=pxToJun(e.clientX,e.clientY);
    if(id>0)showPanel(id);else closePanel();
  }
  drag=false;
});

// 滾輪與按鈕縮放
mc.addEventListener('wheel',e=>{
  e.preventDefault();
  const ns=Math.max(0.3,Math.min(15,sc*(e.deltaY<0?1.2:0.8)));
  vx=e.clientX-(e.clientX-vx)*(ns/sc);vy=e.clientY-(e.clientY-vy)*(ns/sc);
  sc=ns;clamp();render();
},{passive:false});

document.getElementById('zi').onclick=()=>{ const ns=Math.min(15,sc*1.4); vx=window.innerWidth/2-(window.innerWidth/2-vx)*(ns/sc); vy=window.innerHeight/2-(window.innerHeight/2-vy)*(ns/sc); sc=ns; render(); };
document.getElementById('zo').onclick=()=>{ const ns=Math.max(0.3,sc/1.4); vx=window.innerWidth/2-(window.innerWidth/2-vx)*(ns/sc); vy=window.innerHeight/2-(window.innerHeight/2-vy)*(ns/sc); sc=ns; render(); };
document.getElementById('rh').onclick=resetView;

init();
</script>
</body>
</html>

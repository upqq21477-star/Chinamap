<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Legion3K 軍團三國</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap');
  :root { --silk:#c8a87a; --blood:#8b1a1a; --panel-w:260px; --paper:#f5ead8; }
  *{ margin:0;padding:0;box-sizing:border-box; }
  body{ background:#0d0806;font-family:'Noto Serif TC',serif;overflow:hidden;height:100vh;display:flex;flex-direction:column; }

  #header{
    background:linear-gradient(90deg,#1a0e05,#2d1a0a,#1a0e05);
    border-bottom:2px solid var(--silk);
    padding:6px 16px;display:flex;align-items:center;justify-content:space-between;
    flex-shrink:0;
  }
  #header h1{color:var(--silk);font-size:1.1rem;font-weight:900;letter-spacing:.15em;text-shadow:0 0 12px rgba(200,168,122,.5);}
  #hinfo{color:#8a7060;font-size:.7rem;text-align:right;}

  #main{display:flex;flex:1;overflow:hidden;}

  #canvas-wrap{flex:1;position:relative;overflow:hidden;background:#0d1520;cursor:crosshair;}
  #map-canvas,#ui-canvas{
    position:absolute;top:0;left:0;
    width:720px;height:490px;
    image-rendering:pixelated;image-rendering:crisp-edges;
    transform-origin:top left;
  }
  #ui-canvas{pointer-events:none;}

  #side-panel{
    width:var(--panel-w);background:linear-gradient(180deg,#160e06,#0e0905);
    border-left:1px solid #3a2510;display:flex;flex-direction:column;
    overflow:hidden;flex-shrink:0;
  }
  #ph{background:linear-gradient(90deg,#2d1a0a,#1a0e05);border-bottom:1px solid var(--silk);padding:10px 14px;}
  #pt{color:var(--silk);font-size:1rem;font-weight:700;}
  #ps{color:#8a7060;font-size:.65rem;margin-top:2px;}
  #pb{flex:1;overflow-y:auto;padding:10px;scrollbar-width:thin;scrollbar-color:#3a2510 transparent;}

  .row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #2a1a0a;font-size:.72rem;}
  .lbl{color:#8a7060;}
  .val{color:var(--paper);font-weight:700;}
  .val.hl{color:var(--silk);}
  .sw{width:14px;height:14px;border-radius:2px;border:1px solid rgba(255,255,255,.2);display:inline-block;vertical-align:middle;margin-right:6px;}
  #nbs{margin-top:10px;}
  #nbs h3{color:#8a7060;font-size:.65rem;margin-bottom:6px;letter-spacing:.1em;}
  .nb{display:inline-block;background:#2a1a0a;border:1px solid #3a2510;color:var(--paper);font-size:.62rem;padding:2px 6px;border-radius:3px;margin:2px;cursor:pointer;transition:all .15s;}
  .nb:hover{background:#3a2a14;border-color:var(--silk);color:var(--silk);}
  #nosel{color:#5a4030;font-size:.75rem;text-align:center;padding:30px 10px;line-height:1.8;}

  #tip{
    position:absolute;background:rgba(20,10,3,.92);border:1px solid var(--silk);
    color:var(--paper);font-size:.68rem;padding:4px 8px;border-radius:3px;
    pointer-events:none;display:none;z-index:200;white-space:nowrap;
  }
  #loading{
    position:absolute;inset:0;background:#0d0806;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    z-index:500;color:var(--silk);font-size:1rem;letter-spacing:.2em;
  }
  #lb-w{width:200px;height:3px;background:#2a1a0a;margin-top:16px;border-radius:2px;overflow:hidden;}
  #lb{height:100%;background:var(--silk);width:0%;transition:width .3s;}
</style>
</head>
<body>

<div id="loading">
  <div>軍團三國</div>
  <div style="font-size:.65rem;color:#8a7060;margin-top:8px;letter-spacing:.1em">正在載入地圖…</div>
  <div id="lb-w"><div id="lb"></div></div>
</div>

<div id="header">

</div>

<div id="main">

        <div id="nbs"><h3>▸ 相鄰郡國</h3><div id="i-nb"></div></div>
      </div>
    </div>
  </div>
</div>

const CLR=new Uint8Array(256*3);
for(const id in JUN){ const[r,g,b]=hexRGB(JUN[+id].c); const i=(+id)*3; CLR[i]=r;CLR[i+1]=g;CLR[i+2]=b; }

function fitMap(){
  const wrap=document.getElementById('canvas-wrap');
  const cw=wrap.clientWidth, ch=wrap.clientHeight;
  const s=Math.min(cw/W, ch/H);
  currentScale=s; offX=(cw-W*s)/2; offY=(ch-H*s)/2;
  const t=`translate(${offX}px,${offY}px) scale(${s})`;
  mapCanvas.style.transform=t; uiCanvas.style.transform=t;
}

function buildImage(){
  imgData=mapCtx.createImageData(W,H);
  const d=imgData.data;
  for(let i=0;i<TOTAL;i++){
    const o=CELL_OWNER[i], p=i*4;
    if(!o){ d[p]=15;d[p+1]=25;d[p+2]=55;d[p+3]=255; }
    else{ const ci=o*3; d[p]=CLR[ci];d[p+1]=CLR[ci+1];d[p+2]=CLR[ci+2];d[p+3]=255; }
  }
}

function buildFrontline(){
  // draw frontier pixels darker directly into imgData
  const d=imgData.data;
  for(let i=0;i<TOTAL;i++){
    const a=CELL_OWNER[i]; if(!a) continue;
    let border=false;
    if((i%W)<W-1 && CELL_OWNER[i+1] && CELL_OWNER[i+1]!==a) border=true;
    if(!border && i+W<TOTAL && CELL_OWNER[i+W] && CELL_OWNER[i+W]!==a) border=true;
    if(border){ const p=i*4; d[p]=d[p]*0.55|0; d[p+1]=d[p+1]*0.55|0; d[p+2]=d[p+2]*0.55|0; }
  }
}

function render(){
  mapCtx.putImageData(imgData,0,0);
  // selection ring on ui canvas
  uiCtx.clearRect(0,0,W,H);
  if(selectedId && JUN[selectedId]?.cx){
    const j=JUN[selectedId];
    uiCtx.strokeStyle='#ffe44a'; uiCtx.lineWidth=1.5;
    uiCtx.strokeRect(j.cx-12, j.cy-6, 24, 12);
  }
}

function screenToMap(cx,cy){
  const wrap=document.getElementById('canvas-wrap');
  const rect=wrap.getBoundingClientRect();
  return[Math.floor((cx-rect.left-offX)/currentScale), Math.floor((cy-rect.top-offY)/currentScale)];
}

function handleTap(e){
  e.preventDefault();
  const src=e.touches?e.changedTouches[0]:e;
  const[mx,my]=screenToMap(src.clientX,src.clientY);
  if(mx<0||mx>=W||my<0||my>=H) return;
  const id=CELL_OWNER[my*W+mx];
  if(!id){ selectedId=null; document.getElementById('nosel').style.display=''; document.getElementById('jinfo').style.display='none'; render(); return; }
  selectedId=id; showPanel(id); render();
}

function handleMove(e){
  const[mx,my]=screenToMap(e.clientX,e.clientY);
  const tip=document.getElementById('tip');
  if(mx<0||mx>=W||my<0||my>=H){ tip.style.display='none'; return; }
  const id=CELL_OWNER[my*W+mx];
  if(!id){ tip.style.display='none'; return; }
  const j=JUN[id];
  const wrap=document.getElementById('canvas-wrap');
  const rect=wrap.getBoundingClientRect();
  tip.style.display='block';
  tip.style.left=(e.clientX-rect.left+12)+'px';
  tip.style.top =(e.clientY-rect.top -8)+'px';
  tip.textContent=`${j.n} · ${j.fn} · 動員:${j.m}`;
}

function showPanel(id){
  const j=JUN[id]; if(!j) return;
  document.getElementById('nosel').style.display='none';
  document.getElementById('jinfo').style.display='';
  document.getElementById('i-n').textContent=j.n;
  document.getElementById('i-sw').style.background=j.c;
  document.getElementById('i-c').textContent=j.c;
  document.getElementById('i-r').textContent=j.r;
  document.getElementById('i-f').textContent=j.fn;
  document.getElementById('i-m').textContent=j.m;
  document.getElementById('i-t').textContent=j.t;
  document.getElementById('i-a').textContent=j.ap.toLocaleString()+' px';
  const div=document.getElementById('i-nb'); div.innerHTML='';
  for(const nid of(j.nb||[])){
    if(!JUN[nid]) continue;
    const t=document.createElement('span'); t.className='nb'; t.textContent=JUN[nid].n;
    t.onclick=()=>{ selectedId=nid; showPanel(nid); render(); };
    div.appendChild(t);
  }
}

async function init(){
  const lb=document.getElementById('lb');
  lb.style.width='30%';
  // BIN_B64 already loaded from map_data.js
  const s=atob(BIN_B64);
  MAP_RAW=new Uint8Array(s.length);
  for(let i=0;i<s.length;i++) MAP_RAW[i]=s.charCodeAt(i);
  CELL_OWNER=new Uint8Array(MAP_RAW);
  lb.style.width='60%';
  fitMap();
  buildImage();
  buildFrontline();
  lb.style.width='100%';
  render();
  setTimeout(()=>document.getElementById('loading').style.display='none', 200);
}

const wrap=document.getElementById('canvas-wrap');
wrap.addEventListener('click',    handleTap, {passive:false});
wrap.addEventListener('touchend', handleTap, {passive:false});
wrap.addEventListener('mousemove',handleMove);
wrap.addEventListener('mouseleave',()=>document.getElementById('tip').style.display='none');
window.addEventListener('resize',()=>{ fitMap(); render(); });

init();
</script>

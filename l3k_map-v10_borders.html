<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>軍團三國 · 地圖</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

:root{
  --ink:#1a0f00;
  --parch:#f5e6c8;
  --parch2:#ede0b5;
  --gold:#c8921a;
  --gold2:#e8b43a;
  --red:#8b1a1a;
  --panel-bg:rgba(15,8,2,0.96);
  --border:rgba(200,146,26,0.4);
  --border-bright:rgba(200,146,26,0.85);
  --text-main:#f0ddb0;
  --text-sub:rgba(240,221,176,0.6);
  --text-dim:rgba(240,221,176,0.38);
}

body{
  background:#0c0700;
  color:var(--text-main);
  font-family:'Noto Serif TC',serif;
  overflow:hidden;
  width:100vw;height:100vh;
  user-select:none;
}

/* ── canvas layer ── */
#map-wrap{
  position:fixed;inset:0;
  cursor:grab;
}
#map-wrap:active{cursor:grabbing}
canvas{
  position:absolute;top:0;left:0;
  image-rendering:pixelated;
  image-rendering:crisp-edges;
}
#c-base{z-index:1}
#c-ovl{z-index:2}
#c-ui{z-index:3;pointer-events:none}

/* ── top bar ── */
#topbar{
  position:fixed;top:0;left:0;right:0;
  height:48px;z-index:100;
  background:linear-gradient(180deg,rgba(10,5,0,0.98),rgba(10,5,0,0.82));
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 16px;
  backdrop-filter:blur(8px);
  pointer-events:none;
}
#topbar h1{
  font-size:15px;letter-spacing:.35em;color:var(--gold2);
  text-shadow:0 0 18px rgba(200,146,26,.6);
  font-weight:700;
  flex-shrink:0;
}
#topbar .sub{
  margin-left:auto;font-size:11px;color:var(--text-dim);
  letter-spacing:.15em;
}
.region-label{
  position:fixed;top:calc(48px + 2em);left:50%;transform:translateX(-50%);
  z-index:101;
  background:rgba(10,5,0,0.90);
  border:1px solid var(--border-bright);
  border-radius:12px;
  padding:7px 16px;
  backdrop-filter:blur(8px);
  opacity:1;
  transition:opacity .28s, transform .28s;
  box-shadow:0 4px 20px rgba(0,0,0,.5), 0 0 0 1px rgba(200,146,26,.08);
  min-width:120px;
  text-align:center;
}
.region-label.hidden{
  opacity:0;
  pointer-events:none;
  transform:translateX(-50%) translateY(-8px);
}
.region-label-inner{
  display:flex;flex-direction:column;align-items:center;gap:3px;
}
.region-label-row{
  display:flex;align-items:center;gap:5px;
}
.rl-dot{
  width:7px;height:7px;border-radius:50%;
  flex-shrink:0;
  box-shadow:0 0 5px currentColor;
}
.rl-state{
  font-size:11px;letter-spacing:.3em;color:var(--text-dim);
  font-weight:400;
}
.rl-sep{
  width:32px;height:1px;
  background:linear-gradient(90deg,transparent,var(--border),transparent);
}
.rl-county{
  font-size:16px;font-weight:700;letter-spacing:.18em;
  color:var(--gold2);
  text-shadow:0 0 14px rgba(232,180,58,.45);
  line-height:1.2;
}

/* ── zoom buttons ── */
#zoom-ctrl{
  position:fixed;bottom:200px;right:14px;
  z-index:100;display:flex;flex-direction:column;gap:6px;
}
.zbtn{
  width:42px;height:42px;
  background:rgba(10,5,0,0.88);
  border:1px solid var(--border);border-radius:10px;
  color:var(--gold);font-size:22px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;backdrop-filter:blur(4px);
  transition:background .18s,border-color .18s;
  -webkit-tap-highlight-color:transparent;
}
.zbtn:active{background:rgba(200,146,26,.18);border-color:var(--border-bright)}

/* ── info panel ── */
#panel{
  position:fixed;bottom:0;left:0;right:0;
  z-index:200;
  background:var(--panel-bg);
  border-top:1px solid var(--border-bright);
  border-radius:20px 20px 0 0;
  padding:0 0 env(safe-area-inset-bottom,0);
  transform:translateY(100%);
  transition:transform .32s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 -12px 48px rgba(0,0,0,.8);
  max-height:68vh;
  overflow:hidden;
  display:flex;flex-direction:column;
}
#panel.open{transform:translateY(0)}

/* handle bar */
.handle{
  width:40px;height:4px;border-radius:2px;
  background:var(--border);
  margin:14px auto 0;flex-shrink:0;
}

/* panel header */
.ph{
  display:flex;align-items:flex-start;gap:10px;
  padding:14px 18px 0;flex-shrink:0;
}
.ph-color{
  width:14px;height:14px;border-radius:50%;
  flex-shrink:0;margin-top:5px;
  box-shadow:0 0 8px currentColor;
}
.ph-name{
  font-size:22px;font-weight:700;color:var(--gold2);
  letter-spacing:.06em;line-height:1.2;
  text-shadow:0 0 20px rgba(232,180,58,.35);
  flex:1;
}
.ph-close{
  width:32px;height:32px;border-radius:50%;
  background:rgba(200,146,26,.12);
  border:1px solid var(--border);
  color:var(--gold);font-size:16px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;
  transition:background .15s;
}
.ph-close:active{background:rgba(200,146,26,.3)}

/* divider */
.pdiv{
  height:1px;
  background:linear-gradient(90deg,transparent,var(--border),transparent);
  margin:12px 18px;flex-shrink:0;
}

/* meta grid */
.meta{
  display:grid;grid-template-columns:1fr 1fr;gap:12px;
  padding:0 18px;flex-shrink:0;
}
.meta-item{display:flex;flex-direction:column;gap:3px}
.meta-label{font-size:10px;letter-spacing:.2em;color:var(--text-dim);text-transform:uppercase}
.meta-val{font-size:14px;color:var(--text-main);letter-spacing:.04em}
.meta-val.id-val{
  font-family:monospace;color:var(--gold);font-size:13px;
}

/* region button */
.region-btn{
  margin:14px 18px 0;
  padding:11px 16px;
  background:linear-gradient(135deg,rgba(200,146,26,.12),rgba(200,146,26,.06));
  border:1px solid var(--border);border-radius:10px;
  color:var(--gold2);font-size:13px;letter-spacing:.12em;
  font-family:'Noto Serif TC',serif;
  cursor:pointer;width:calc(100% - 36px);
  transition:background .18s,border-color .18s;
  display:flex;align-items:center;justify-content:center;gap:8px;
  flex-shrink:0;
}
.region-btn:active{background:rgba(200,146,26,.22);border-color:var(--border-bright)}
.region-btn .arrow{
  font-size:11px;color:var(--text-dim);
  transition:transform .2s;
}
.region-btn.expanded .arrow{transform:rotate(180deg)}

/* region list */
#region-list{
  overflow-y:auto;
  flex:1;
  padding:10px 18px 20px;
}
#region-list:empty{display:none}
.region-header{
  font-size:11px;letter-spacing:.2em;color:var(--text-dim);
  margin-bottom:10px;padding-top:4px;
}
.rjun-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;
}
.rjun-item{
  background:rgba(200,146,26,.07);
  border:1px solid var(--border);
  border-radius:8px;padding:9px 10px;
  cursor:pointer;
  transition:background .15s,border-color .15s;
}
.rjun-item:active{background:rgba(200,146,26,.2);border-color:var(--border-bright)}
.rjun-item .dot{
  width:10px;height:10px;border-radius:50%;
  display:inline-block;margin-right:5px;vertical-align:middle;
}
.rjun-item .rjname{font-size:13px;color:var(--text-main);vertical-align:middle}
.rjun-item .rjfac{font-size:10px;color:var(--text-dim);margin-top:3px;letter-spacing:.04em}

/* loading */
#loading{
  position:fixed;inset:0;z-index:999;
  background:#0c0700;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .5s;
}
#loading.fade{opacity:0;pointer-events:none}
#loading h2{
  font-size:20px;letter-spacing:.4em;color:var(--gold2);
  margin-bottom:28px;
  text-shadow:0 0 24px rgba(200,146,26,.7);
}
.load-bar{width:180px;height:2px;background:rgba(200,146,26,.15);border-radius:1px;overflow:hidden}
.load-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));animation:lfill 1.6s ease-out forwards}
@keyframes lfill{from{width:0}to{width:100%}}
.load-sub{margin-top:12px;font-size:11px;color:var(--text-dim);letter-spacing:.2em}
</style>
</head>

<div id="loading">
  <h2>軍團三國</h2>
  <div class="load-bar"><div class="load-fill"></div></div>
  <div class="load-sub">載入地圖中…</div>
</div>

<div id="topbar">

  <div id="region-label" class="region-label hidden">

<div id="map-wrap">

<div id="zoom-ctrl">

<div id="panel">

    <span class="arrow">▼</span>
  </button>
  <div id="region-list"></div>
</div>

const MAP_W = 720, MAP_H = 490;

// precompute region map
const REGIONS = {};
Object.entries(JUN).forEach(([id, d]) => {
  if (!REGIONS[d.r]) REGIONS[d.r] = [];
  REGIONS[d.r].push(Number(id));
});

// ── Canvas setup ──────────────────────────────────────
const wrap = document.getElementById('map-wrap');
const cBase = document.getElementById('c-base');
const cOvl  = document.getElementById('c-ovl');
const ctxB  = cBase.getContext('2d');
const ctxO  = cOvl.getContext('2d');

let W = window.innerWidth, H = window.innerHeight;
function setSizes(){
  W = window.innerWidth; H = window.innerHeight;
  cBase.width = cOvl.width = W;
  cBase.height = cOvl.height = H;
}
setSizes();

// ── State ─────────────────────────────────────────────
let vx = 0, vy = 0, sc = 1;
let pm = null;          // pixel map Uint8Array
let baseImg = null;     // ImageData of base map
let selId = null;       // selected jun id
let showRegion = false; // region mode

function clamp(){
  const m = 60;
  vx = Math.max(-(MAP_W*sc - m), Math.min(W - m, vx));
  vy = Math.max(-(MAP_H*sc - m), Math.min(H - m, vy));
}
function fit(){
  sc = Math.min(W/MAP_W, (H-48)/MAP_H) * 0.94;
  vx = (W - MAP_W*sc)/2;
  vy = (H - MAP_H*sc)/2 + 24;
}

// ── Colour helpers ────────────────────────────────────
function hexToRgb(h){
  return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
}

let _borderCache = null;
function getBorderCache(){
  if(_borderCache) return _borderCache;
  _borderCache = new Uint8Array(1058400);
  const grades = ['S','A','B','C','D'];
  const gradeRank = {'S':0,'A':1,'B':2,'C':3,'D':4};
  const rankArr = new Uint8Array(352800).fill(255);
  for(const g of grades){
    const b64 = BORDER_PIXELS_B64[g];
    if(!b64) continue;
    const binStr = atob(b64);
    const buf = new Uint8Array(binStr.length);
    for(let k=0;k<binStr.length;k++) buf[k]=binStr.charCodeAt(k);
    const dv = new DataView(buf.buffer);
    let idx = 0;
    for(let k=0;k<buf.length;k+=4){
      idx += dv.getUint32(k, true);
      const rank = gradeRank[g];
      if(rank < rankArr[idx]){
        rankArr[idx] = rank;
        _borderCache[idx*3]  = BORDER_COLORS[g][0];
        _borderCache[idx*3+1]= BORDER_COLORS[g][1];
        _borderCache[idx*3+2]= BORDER_COLORS[g][2];
      }
    }
  }
  return _borderCache;
}

function buildBase(){
  const img = ctxB.createImageData(MAP_W, MAP_H);
  const d = img.data;

  // Layer 1: 郡色底圖（依當前 pm，隨攻伐變動）
  for(let i = 0; i < MAP_W * MAP_H; i++){
    const id = pm[i];
    if(!id || !JUN[id]){
      d[i*4]=10; d[i*4+1]=5; d[i*4+2]=2; d[i*4+3]=255;
    } else {
      const [r,g,b] = hexToRgb(JUN[id].c);
      d[i*4]=r; d[i*4+1]=g; d[i*4+2]=b; d[i*4+3]=255;
    }
  }

  // Layer 2: 固定邊界層（靜態預計算，永久不變）
  const bc = getBorderCache();
  for(let i = 0; i < MAP_W * MAP_H; i++){
    if(!bc[i*3] && !bc[i*3+1] && !bc[i*3+2]) continue;
    d[i*4]=bc[i*3]; d[i*4+1]=bc[i*3+1]; d[i*4+2]=bc[i*3+2]; d[i*4+3]=255;
  }

  // Layer 3: id=0 黑色阻斷（最上層，覆蓋一切）
  for(let i = 0; i < MAP_W * MAP_H; i++){
    if(pm[i] !== 0) continue;
    d[i*4]=0; d[i*4+1]=0; d[i*4+2]=0; d[i*4+3]=255;
  }

  baseImg = img;
}

// ── Render ────────────────────────────────────────────
const offscreen = document.createElement('canvas');
offscreen.width = MAP_W; offscreen.height = MAP_H;
const octx = offscreen.getContext('2d');

function drawBase(){
  ctxB.fillStyle='#0c0700';
  ctxB.fillRect(0,0,W,H);
  ctxB.save();
  ctxB.imageSmoothingEnabled = false;
  octx.putImageData(baseImg,0,0);
  ctxB.drawImage(offscreen, vx, vy, MAP_W*sc, MAP_H*sc);
  ctxB.restore();
}

function drawOvl(){
  ctxO.clearRect(0,0,W,H);
  if(!selId) return;

  const highlight = new Set(Object.keys(JUN[selId]?.nb||{}).map(Number));
  let regionSet = null;
  if(showRegion){
    const reg = JUN[selId]?.r;
    regionSet = new Set(REGIONS[reg] || []);
  }

  const ov = ctxO.createImageData(MAP_W, MAP_H);
  const od = ov.data;

  for(let i = 0; i < MAP_W*MAP_H; i++){
    const id = pm[i];
    if(!id) continue;

    if(showRegion){
      // region mode: dim non-region, bright region
      if(id === selId){
        // selected: border glow handled below
        od[i*4+3] = 0;
      } else if(regionSet.has(id)){
        // same region: slight brighten
        od[i*4]=255; od[i*4+1]=220; od[i*4+2]=100; od[i*4+3]=18;
      } else {
        // outside region: darken
        od[i*4]=0; od[i*4+1]=0; od[i*4+2]=0; od[i*4+3]=180;
      }
    } else {
      // normal mode
      if(id === selId){
        od[i*4+3] = 0;
      } else if(highlight.has(id)){
        // neighbour: warm highlight
        od[i*4]=255; od[i*4+1]=210; od[i*4+2]=80; od[i*4+3]=50;
      } else {
        // others: dim
        od[i*4]=0; od[i*4+1]=0; od[i*4+2]=0; od[i*4+3]=160;
      }
    }
  }

  // border glow for selected
  for(let y=0;y<MAP_H;y++){
    for(let x=0;x<MAP_W;x++){
      const i=y*MAP_W+x;
      if(pm[i]!==selId) continue;
      const isBord=(x>0&&pm[i-1]!==selId)||(x<MAP_W-1&&pm[i+1]!==selId)||
                   (y>0&&pm[i-MAP_W]!==selId)||(y<MAP_H-1&&pm[i+MAP_W]!==selId);
      if(isBord){od[i*4]=255;od[i*4+1]=230;od[i*4+2]=100;od[i*4+3]=255;}
      else{od[i*4]=255;od[i*4+1]=220;od[i*4+2]=120;od[i*4+3]=24;}
    }
  }

  const tmpC = document.createElement('canvas');
  tmpC.width=MAP_W; tmpC.height=MAP_H;
  tmpC.getContext('2d').putImageData(ov,0,0);
  ctxO.save();
  ctxO.imageSmoothingEnabled=false;
  ctxO.drawImage(tmpC,vx,vy,MAP_W*sc,MAP_H*sc);
  ctxO.restore();
}

function render(){ drawBase(); drawOvl(); }

// ── Pixel hit ─────────────────────────────────────────
function pxToId(cx,cy){
  const mx=Math.floor((cx-vx)/sc), my=Math.floor((cy-vy)/sc);
  if(mx<0||my<0||mx>=MAP_W||my>=MAP_H) return 0;
  return pm[my*MAP_W+mx];
}

const panel     = document.getElementById('panel');
const phColor   = document.getElementById('ph-color');
const phName    = document.getElementById('ph-name');
const mId       = document.getElementById('m-id');
const mRegion   = document.getElementById('m-region');
const mFaction  = document.getElementById('m-faction');
const regionBtn = document.getElementById('region-btn');
const regionBtnText = document.getElementById('region-btn-text');
const regionList= document.getElementById('region-list');

// ── Region label helper ───────────────────────────────
function setRegionLabel(id){
  const d = JUN[id];
  if(!d) return;
  document.getElementById('rl-dot').style.color = d.c;
  document.getElementById('rl-dot').style.background = d.c;
  document.getElementById('rl-state').textContent = d.r;
  document.getElementById('rl-county').textContent = d.n;
  document.getElementById('region-label').classList.remove('hidden');
  document.getElementById('topbar-sub').style.display = 'none';
}
function hideRegionLabel(){
  document.getElementById('region-label').classList.add('hidden');
  document.getElementById('topbar-sub').style.display = '';
}

function openPanel(id){
  const d = JUN[id];
  if(!d) return;
  // if already in region-highlight mode, just update selId and re-render (keep panel hidden)
  if(showRegion){
    selId = id;
    setRegionLabel(id);
    render();
    return;
  }
  selId = id;
  showRegion = false;
  regionBtn.classList.remove('expanded');
  regionBtnText.textContent = '展示所屬州全部郡縣';
  regionList.innerHTML = '';
  hideRegionLabel();

  phColor.style.color = d.c;
  phColor.style.background = d.c;
  phName.textContent = d.n;
  mId.textContent = '#' + id;
  mRegion.textContent = d.r;
  mFaction.textContent = d.f;

  panel.classList.add('open');
  render();
}

function closePanel(){
  panel.classList.remove('open');
  selId = null;
  showRegion = false;
  regionList.innerHTML = '';
  regionBtn.classList.remove('expanded');
  regionBtnText.textContent = '展示所屬州全部郡縣';
  hideRegionLabel();
  render();
}

document.getElementById('ph-close').addEventListener('click', closePanel);

// region button — hide panel, light up all region cells
regionBtn.addEventListener('click', ()=>{
  if(!selId) return;
  showRegion = true;
  panel.classList.remove('open');
  setRegionLabel(selId);
  render();
});

// ── Touch / mouse ─────────────────────────────────────
let drag=false, moved=false, dsx=0, dsy=0, dvx=0, dvy=0;
let pinch=false, p0d=0, p0s=0, p0mx=0, p0my=0, p0vx=0, p0vy=0;

wrap.addEventListener('touchstart', e=>{
  e.preventDefault();
  const t = e.touches;
  if(t.length===1){
    drag=true; moved=false; pinch=false;
    dsx=t[0].clientX; dsy=t[0].clientY; dvx=vx; dvy=vy;
  } else if(t.length===2){
    drag=false; pinch=true;
    const dx=t[1].clientX-t[0].clientX, dy=t[1].clientY-t[0].clientY;
    p0d=Math.hypot(dx,dy); p0s=sc;
    p0mx=(t[0].clientX+t[1].clientX)/2; p0my=(t[0].clientY+t[1].clientY)/2;
    p0vx=vx; p0vy=vy;
  }
},{passive:false});

wrap.addEventListener('touchmove', e=>{
  e.preventDefault();
  const t = e.touches;
  if(t.length===1&&drag){
    const dx=t[0].clientX-dsx, dy=t[0].clientY-dsy;
    if(Math.hypot(dx,dy)>3) moved=true;
    vx=dvx+dx; vy=dvy+dy; clamp(); render();
  } else if(t.length===2&&pinch){
    moved=true;
    const dx=t[1].clientX-t[0].clientX, dy=t[1].clientY-t[0].clientY;
    const nd=Math.hypot(dx,dy), ns=Math.max(.4,Math.min(10,p0s*(nd/p0d)));
    const mx=(t[0].clientX+t[1].clientX)/2, my=(t[0].clientY+t[1].clientY)/2;
    vx=mx-(mx-p0vx)*(ns/p0s); vy=my-(my-p0vy)*(ns/p0s);
    sc=ns; clamp(); render();
  }
},{passive:false});

wrap.addEventListener('touchend', e=>{
  e.preventDefault();
  if(!moved&&drag){
    const tc=e.changedTouches[0];
    const id=pxToId(tc.clientX,tc.clientY);
    if(id>0) openPanel(id);
    else closePanel();
  }
  drag=false; pinch=false;
},{passive:false});

// mouse
wrap.addEventListener('mousedown', e=>{drag=true;moved=false;dsx=e.clientX;dsy=e.clientY;dvx=vx;dvy=vy;});
wrap.addEventListener('mousemove', e=>{
  if(!drag) return;
  if(Math.hypot(e.clientX-dsx,e.clientY-dsy)>3) moved=true;
  vx=dvx+(e.clientX-dsx); vy=dvy+(e.clientY-dsy); clamp(); render();
});
wrap.addEventListener('mouseup', e=>{
  if(!moved){ const id=pxToId(e.clientX,e.clientY); if(id>0)openPanel(id); else closePanel(); }
  drag=false;
});
wrap.addEventListener('wheel', e=>{
  e.preventDefault();
  const ns=Math.max(.4,Math.min(10,sc*(e.deltaY<0?1.12:.9)));
  vx=e.clientX-(e.clientX-vx)*(ns/sc); vy=e.clientY-(e.clientY-vy)*(ns/sc);
  sc=ns; clamp(); render();
},{passive:false});

// zoom buttons
document.getElementById('zin').addEventListener('click',()=>{
  const ns=Math.min(10,sc*1.3);
  vx=W/2-(W/2-vx)*(ns/sc); vy=H/2-(H/2-vy)*(ns/sc); sc=ns; clamp(); render();
});
document.getElementById('zout').addEventListener('click',()=>{
  const ns=Math.max(.4,sc/1.3);
  vx=W/2-(W/2-vx)*(ns/sc); vy=H/2-(H/2-vy)*(ns/sc); sc=ns; clamp(); render();
});

window.addEventListener('resize',()=>{setSizes();render();});

// ── Init ──────────────────────────────────────────────
function b64ToU8(b64){
  const bin=atob(b64), a=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) a[i]=bin.charCodeAt(i);
  return a;
}

function init(){
  pm = b64ToU8(PIX_B64);
  buildBase();
  fit();
  render();
  setTimeout(()=>{
    const l=document.getElementById('loading');
    l.classList.add('fade');
    setTimeout(()=>l.remove(),520);
  },1400);
}

init();
</script>
